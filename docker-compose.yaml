services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./src/public:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql
